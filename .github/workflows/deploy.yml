name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to publish to Pages using the built-in token.
permissions:
  contents: read
  pages: write
  id-token: write

# One production deploy at a time; don't cancel a run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint

      - name: Export web build
        run: npx expo export --platform web

      - name: Disable Jekyll (serve _expo/ assets verbatim)
        run: touch dist/.nojekyll

      # GitHub Pages has no SPA rewrite: any path without a matching file (an
      # unknown route, or a pre-rendered route requested WITH a trailing slash,
      # e.g. /alphabet/) would hit GitHub's own 404. Serving index.html as
      # 404.html boots the app for those paths so Expo Router can resolve them
      # client-side.
      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
